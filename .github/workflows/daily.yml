name: Daily Collectors

on:
  workflow_dispatch:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전일)
    - cron: "0 22 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: DART smoke
        if: ${{ env.DART_API_KEY != '' }}
        run: python scripts/dart_smoke.py
        continue-on-error: true

      - name: KRX smoke
        run: python scripts/krx_smoke.py
        continue-on-error: true

      - name: KIS smoke
        if: ${{ env.KIS_APP_KEY != '' && env.KIS_APP_SECRET != '' }}
        run: python scripts/kis_smoke.py
        continue-on-error: true

      - name: Telegram collect (best effort)
        if: ${{ env.TELEGRAM_API_ID != '' && env.TELEGRAM_API_HASH != '' && env.TELEGRAM_SESSION != '' }}
        run: |
          python -c "
          import json
          from dataclasses import asdict
          from src.collectors.telegram_listener import collect
          msgs = collect(limit_per_channel=100)
          print(f'collected={len(msgs)}')
          import pathlib
          pathlib.Path('out').mkdir(exist_ok=True)
          with open('out/telegram_messages.json', 'w', encoding='utf-8') as f:
              json.dump([asdict(m) for m in msgs], f, ensure_ascii=False, indent=2)
          "
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-collect-${{ github.run_id }}
          path: |
            out/
            .cache/
          if-no-files-found: ignore
          retention-days: 7
