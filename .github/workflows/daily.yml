name: Daily Collectors

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "휴장일 무시하고 강제 실행 (테스트용)"
        type: boolean
        required: false
        default: false
  schedule:
    # 매일 07:00 KST = 22:00 UTC 발동.
    # 단 check-holiday 가 KST today_kst() (= 봇이 그날 장에서 사용할 날)
    # 가 영업일인지 검사 → 휴장이면 collect 잡 skip. 즉 "다음날이 영업일" 일
    # 때만 push.
    - cron: "0 22 * * *"

jobs:
  check-holiday:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from src.utils.kst_time import is_business_day, today_kst
          force = os.environ.get("FORCE_RUN", "false").lower() == "true"
          today = today_kst()
          if force:
              skip = "false"
              print(f"::notice::force_run=True — 휴일 체크 우회 (today={today})")
          else:
              skip = "true" if not is_business_day(today) else "false"
              if skip == "true":
                  print(f"::notice::{today} 휴장 — collect 잡 skip")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
          PY

  collect:
    needs: check-holiday
    if: needs.check-holiday.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
      RESEARCH_HMAC_KEY: ${{ secrets.RESEARCH_HMAC_KEY }}
      BOT_DASHBOARD_URL: ${{ secrets.BOT_DASHBOARD_URL }}
      SWING_API_TOKEN: ${{ secrets.SWING_API_TOKEN }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      EC2_INCOMING: /home/ec2-user/trading-bot/data/research/incoming
      EC2_FINAL: /home/ec2-user/trading-bot/data/research
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: DART smoke
        if: ${{ env.DART_API_KEY != '' }}
        run: python scripts/dart_smoke.py
        continue-on-error: true

      - name: KRX smoke
        run: python scripts/krx_smoke.py
        continue-on-error: true

      - name: KIS smoke
        if: ${{ env.KIS_APP_KEY != '' && env.KIS_APP_SECRET != '' }}
        run: python scripts/kis_smoke.py
        continue-on-error: true

      - name: Telegram collect (best effort)
        if: ${{ env.TELEGRAM_API_ID != '' && env.TELEGRAM_API_HASH != '' && env.TELEGRAM_SESSION != '' }}
        run: |
          python -c "
          import json
          from dataclasses import asdict
          from src.collectors.telegram_listener import collect
          msgs = collect(limit_per_channel=100)
          print(f'collected={len(msgs)}')
          import pathlib
          pathlib.Path('out').mkdir(exist_ok=True)
          with open('out/telegram_messages.json', 'w', encoding='utf-8') as f:
              json.dump([asdict(m) for m in msgs], f, ensure_ascii=False, indent=2)
          "
        continue-on-error: true

      - name: Restore CB/BW tracker
        uses: actions/cache@v4
        with:
          path: .cache/cb_tracker.json
          key: cb-tracker-${{ github.run_id }}
          restore-keys: |
            cb-tracker-

      - name: Generate signed buy_signals + macro + blacklist
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        env:
          UNIVERSE_LIMIT: "30"
        run: python scripts/generate_signals.py

      - name: CB/BW exercise-period sell signals
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: python scripts/cb_bw_check.py
        continue-on-error: true

      - name: Verify HMAC envelopes before push
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          python - <<'PY'
          import glob, hmac, hashlib, json, os, sys
          key = os.environ["RESEARCH_HMAC_KEY"].encode()
          fails = []
          for f in sorted(glob.glob("out/buy_signals_*.json")
                          + glob.glob("out/macro_status_*.json")
                          + glob.glob("out/blacklist_active.json")
                          + glob.glob("out/hot_sectors_*.json")):
              p = json.load(open(f, encoding="utf-8"))
              if p.get("signed_by") != "research_v1" or "sha256_hmac" not in p or "data" not in p:
                  fails.append((f, "envelope shape"))
                  continue
              canon = json.dumps(p["data"], sort_keys=True, separators=(",", ":"), ensure_ascii=False).encode()
              expected = hmac.new(key, canon, hashlib.sha256).hexdigest()
              if expected != p["sha256_hmac"]:
                  fails.append((f, "hmac mismatch"))
                  continue
              print(f"[ok] {f}")
          if fails:
              for f, why in fails:
                  print(f"::error::{f}: {why}")
              sys.exit(1)
          PY

      - name: Prepare SSH key
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure EC2 directories
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          ssh -i ~/.ssh/ec2_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p '${EC2_INCOMING}' '${EC2_FINAL}'"

      - name: SCP signed JSONs to EC2 incoming
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          shopt -s nullglob
          files=(out/buy_signals_*.json out/macro_status_*.json out/blacklist_active.json out/hot_sectors_*.json out/sell_signal_*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no signed files to push"; exit 0
          fi
          scp -i ~/.ssh/ec2_key "${files[@]}" \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${EC2_INCOMING}/

      - name: Atomic move incoming -> final
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          ssh -i ~/.ssh/ec2_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mv ${EC2_INCOMING}/*.json ${EC2_FINAL}/"

      - name: Verify arrival on EC2
        if: ${{ env.RESEARCH_HMAC_KEY != '' }}
        run: |
          REMOTE=$(ssh -i ~/.ssh/ec2_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -1 ${EC2_FINAL}/*.json 2>/dev/null | xargs -n1 basename | sort")
          echo "remote final files:"
          echo "$REMOTE"
          for f in $(ls out/ | grep -E '^(buy_signals_|macro_status_|blacklist_active)' | sort); do
            if ! echo "$REMOTE" | grep -qx "$f"; then
              echo "::error::missing on EC2: $f"; exit 1
            fi
          done
          INCOMING_LEFT=$(ssh -i ~/.ssh/ec2_key \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -1 ${EC2_INCOMING}/*.json 2>/dev/null | wc -l")
          if [ "$INCOMING_LEFT" != "0" ]; then
            echo "::error::incoming/ 잔존 ${INCOMING_LEFT} — atomic mv 미완료"; exit 1
          fi
          echo "[ok] EC2 도착 확인"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-collect-${{ github.run_id }}
          path: |
            out/
            .cache/
          if-no-files-found: ignore
          retention-days: 7

      - name: Send Daily to KakaoTalk (자기톡)
        if: success()
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          RESEARCH_HMAC_KEY: ${{ secrets.RESEARCH_HMAC_KEY }}
        run: python scripts/kakao_send.py daily
